name: Release

on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # required for npm provenance + OIDC trusted publishing (tokenless)

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10.34.1

      # No registry-url / NODE_AUTH_TOKEN: publishing auth comes from npm
      # "trusted publishing" via OIDC (pnpm 10.12+ exchanges the id-token for a
      # short-lived npm token). Configure the trusted publisher per package on
      # npm, pointing at this workflow file (release.yml). See PUBLISHING.md.
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      # Opens/updates a "Version Packages" PR when changesets are pending, and
      # publishes to npm when there are none left (i.e. after that PR merges).
      - name: Create Release PR or publish
        uses: changesets/action@v1
        with:
          version: pnpm version-packages
          publish: pnpm release
          commit: "chore: version packages"
          title: "chore: version packages"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_CONFIG_PROVENANCE: "true"
