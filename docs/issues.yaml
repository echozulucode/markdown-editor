  - id: ISSUE-007
    title: "Renderers preview blank with no diagnostics when reached by navigation"
    category: mode-resolution
    severity: high
    observed: "Navigating markdown -> renderers showed an empty preview ('No renderer diagnostics'); fresh load and away+back worked. renderMarkdownToHtml was never called; the preview editor had data-mode='markdown'."
    expected: "The preview renders on every navigation path."
    trace_link: "packages/react/src/MarkdownEditor.tsx (activeMode clamp); react controls test 'clamps the active mode into modes'"
    status: resolved
    resolution: "React reconciled the prior route's markdown-mode editor into the preview editor; initialMode only applies on mount. Clamp activeMode to allowedModes (and re-sync internalMode on modes change)."
    lesson: LESSON-035
    next_action: "none"
    history:
      - "2026-06-07 reported; ruled out Vite dev artifact via production build; instrumented to prove the effect never ran; root-caused to reconciliation + stale mode."

  - id: ISSUE-008
    title: "Controlled editor accumulates blank lines / churns the table widget on repeated structural commits"
    category: react-controlled
    severity: medium
    observed: "A controlled editor (value+onChange, e.g. the full-page-docs example) re-serializes the whole document on each structural commit, adding blank lines and intermittently dropping the hybrid table widget. The BDD pilot therefore drives an uncontrolled fixture (example-bdd-table)."
    expected: "Repeated structural edits on a controlled editor keep the document stable (no blank-line growth, no widget churn)."
    trace_link: "docs/bdd-coverage-and-test-plan.md (Phase 2 follow-up); packages/codemirror/test/markdown-editor-view.test.ts ('hybrid mode preserves the source byte-for-byte')"
    status: resolved
    resolution: "Not a defect. getMarkdown()/onChange output is byte-stable in hybrid mode and a structural edit adds no doubled blank lines (proven by a new regression test). The 'growth' was a `.cm-content` innerText measurement artifact (CodeMirror renders each line as a div; innerText inflates blank-line counts)."
    lesson: LESSON-042
    next_action: "none"
    history:
      - "2026-06-06 discovered while wiring the BDD pilot; worked around with an uncontrolled fixture."
      - "2026-06-07 re-characterized: no per-edit/per-switch accumulation; getMarkdown byte-stable; closed as a measurement artifact with a byte-stability test."

