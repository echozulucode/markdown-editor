type: lessons
project: "markdown-editor"
updated: 2026-05-15
lessons:
  - id: LESSON-001
    date: 2026-05-11
    area: workspace
    lesson: "Use pnpm from the workspace root for all package work."
    rationale: "Parallel package work with npm produced package-lock files and package-local installs that had to be cleaned up during integration."
    applies_to:
      - "root package management"
      - "subagent instructions"
      - "future package scaffolding"
  - id: LESSON-002
    date: 2026-05-11
    area: contracts
    lesson: "Keep public cross-package types in @markdown-editor/core before downstream packages deepen their implementations."
    rationale: "The CodeMirror and renderer lanes initially created local compatible types; aligning CodeMirror back to core was easy early, but this would become expensive after more behavior lands."
    applies_to:
      - "packages/core"
      - "packages/codemirror"
      - "packages/renderers"
      - "packages/react"
  - id: LESSON-003
    date: 2026-05-11
    area: parallel-work
    lesson: "Give subagents disjoint write scopes and integrate immediately after they return."
    rationale: "Parallel lanes completed quickly without file conflicts because ownership was explicit; the coordinator pass then caught workspace-level drift."
    applies_to:
      - "subagent dispatch"
      - "package integration"
  - id: LESSON-004
    date: 2026-05-11
    area: examples
    lesson: "The dev harness should consume public package APIs only."
    rationale: "The harness is intended to become the regression surface for embeddability; importing internals would hide package-boundary problems."
    applies_to:
      - "examples/dev-harness"
      - "future gallery examples"
  - id: LESSON-005
    date: 2026-05-12
    area: frontend
    lesson: "Add bundle splitting before expanding the example gallery."
    rationale: "Once the public React shell pulled CodeMirror into the harness, the Vite production build emitted a large chunk warning. This is acceptable for the scaffold but should not become the gallery baseline."
    applies_to:
      - "packages/react"
      - "packages/codemirror"
      - "examples/dev-harness"
      - "future gallery examples"
  - id: LESSON-006
    date: 2026-05-12
    area: repository-hygiene
    lesson: "Generated declaration and JavaScript artifacts do not belong under package src directories."
    rationale: "Generated files appeared under `packages/core/src`; source directories should contain authored TypeScript only, with build output isolated to ignored `dist` directories."
    applies_to:
      - "packages/core"
      - "all package build configs"
  - id: LESSON-007
    date: 2026-05-13
    area: testing
    lesson: "Run CodeMirror package tests in jsdom when validating editor behavior."
    rationale: "Type-only tests kept the public API honest, but real editing, selection, lifecycle, and change-event behavior needed a DOM-backed Vitest suite."
    applies_to:
      - "packages/codemirror"
      - "packages/react"
      - "future interaction tests"
  - id: LESSON-008
    date: 2026-05-13
    area: bundling
    lesson: "Prefer simple vendor chunk boundaries before finely splitting CodeMirror internals."
    rationale: "A fine-grained CodeMirror language/UI split removed the large chunk warning but introduced a Rollup circular chunk warning; splitting React, CodeMirror, and Lezer kept the build clean."
    applies_to:
      - "examples/dev-harness"
      - "future gallery examples"
      - "package consumption guidance"
  - id: LESSON-009
    date: 2026-05-13
    area: renderers
    lesson: "Expose heavyweight renderers as explicit registry factories before making them defaults."
    rationale: "Adding the Shiki renderer as an opt-in factory gives hosts syntax highlighting support while preserving a small, safe plaintext default and keeping bundle strategy decisions visible."
    applies_to:
      - "packages/renderers"
      - "packages/react"
      - "example gallery renderer setup"
  - id: LESSON-010
    date: 2026-05-13
    area: bundling
    lesson: "Use Shiki core and explicit language/theme loaders for browser-facing examples."
    rationale: "The top-level Shiki bundle pulled every bundled language and theme into the Vite output once the renderer fixture consumed it. Fine-grained core loading kept the build clean while still supporting the MVP language set."
    applies_to:
      - "packages/renderers/src/shiki.ts"
      - "examples/dev-harness"
      - "future syntax-highlighting expansion"
  - id: LESSON-011
    date: 2026-05-14
    area: hybrid-navigation
    lesson: "Hybrid arrow-key movement should operate on logical Markdown source lines, not rendered block boundaries."
    rationale: "Block-boundary navigation made adjacent rendered blocks easy to reveal but still felt like it skipped rows. Moving by source line lets every arrow press reveal or visit exactly one Markdown row."
    applies_to:
      - "packages/codemirror"
      - "hybrid rendered widgets"
      - "future keyboard accessibility tests"
  - id: LESSON-012
    date: 2026-05-14
    area: bundling
    lesson: "Keep WYSIWYG behind a dynamic import and a dedicated manual chunk."
    rationale: "A static React import pulled Lexical into the main React chunk. Lazy loading plus a `wysiwyg-lexical` manual chunk preserved the optional package boundary."
    applies_to:
      - "packages/react"
      - "packages/wysiwyg-lexical"
      - "examples/dev-harness/vite.config.ts"
  - id: LESSON-013
    date: 2026-05-14
    area: browser-runtime
    lesson: "Avoid importing the core parser into browser-only WYSIWYG code when only the frontmatter envelope is needed."
    rationale: "The core parser depends on `gray-matter`, which created a browser build warning. A small local envelope splitter preserved frontmatter without pulling parser internals into the WYSIWYG chunk."
    applies_to:
      - "packages/wysiwyg-lexical"
      - "browser bundle hygiene"
  - id: LESSON-014
    date: 2026-05-14
    area: wysiwyg
    lesson: "Represent WYSIWYG diagram blocks as rendered views with explicit source editing."
    rationale: "Mermaid and PlantUML diagrams need to feel visual in WYSIWYG, but the durable editable artifact is still fenced Markdown source. A Confluence-style edit/apply control keeps the diagram inspectable without pretending there is a graphical editor."
    applies_to:
      - "packages/wysiwyg-lexical"
      - "diagram rendering"
      - "future diagram WYSIWYG support"
  - id: LESSON-015
    date: 2026-05-14
    area: toolbar
    lesson: "Keep WYSIWYG block insertion generic and move block-specific editing into the block surface."
    rationale: "A toolbar textbox for Mermaid does not scale once more block types arrive. A compact insert menu plus per-block editing affordances keeps the toolbar stable while preserving rich source editing where it belongs."
    applies_to:
      - "packages/wysiwyg-lexical"
      - "packages/react"
      - "future toolbar design"
  - id: LESSON-016
    date: 2026-05-14
    area: code-blocks
    lesson: "Treat code-block language as block metadata controlled from the block surface."
    rationale: "A global toolbar language dropdown is ambiguous when a document contains multiple code blocks. The active code block should expose its own language control, and the selected language should drive syntax highlighting."
    applies_to:
      - "packages/wysiwyg-lexical"
      - "code block UX"
      - "future block controls"
  - id: LESSON-017
    date: 2026-05-14
    area: host-services
    lesson: "Use the same host-renderer boundary for PlantUML in every mode."
    rationale: "PlantUML rendering needs a secure host-owned endpoint. WYSIWYG can own the editable source block, but rendering should still flow through the renderer registry or host service used by preview and hybrid."
    applies_to:
      - "packages/react"
      - "packages/wysiwyg-lexical"
      - "PlantUML rendering"
  - id: LESSON-018
    date: 2026-05-14
    area: images
    lesson: "Ship WYSIWYG image editing as URL-backed Markdown metadata before uploads."
    rationale: "Image upload, storage, and asset resolution belong to host services. The reusable editor control should first preserve and edit Markdown image URL, alt text, and title data without taking ownership of asset lifecycle."
    applies_to:
      - "packages/wysiwyg-lexical"
      - "host asset services"
      - "future upload integration"
  - id: LESSON-019
    date: 2026-05-14
    area: wysiwyg
    lesson: "Semantic WYSIWYG imports need tests beyond byte-stable Markdown round trips."
    rationale: "A task list imported as a plain unordered list with literal `[ ]` text can export the same Markdown bytes, so round-trip tests alone can miss broken editor semantics and visuals. Checklist behavior should be validated at the Lexical node or rendered-DOM level."
    applies_to:
      - "packages/wysiwyg-lexical"
      - "checklist rendering"
      - "future semantic WYSIWYG tests"
  - id: LESSON-020
    date: 2026-05-14
    area: e2e
    lesson: "Scope Playwright selectors to the specific editor chrome being asserted."
    rationale: "Hybrid rendered blocks and nested editor surfaces can share accessible roles and labels with toolbar controls. Tests should use stable example shells plus toolbar or mode-surface scoping to avoid false strict-mode failures."
    applies_to:
      - "examples/dev-harness/e2e"
      - "mode toolbar tests"
      - "future rendered-block e2e coverage"
  - id: LESSON-021
    date: 2026-05-14
    area: toolbar
    lesson: "Keep toolbar icon libraries host-supplied through explicit icon slots."
    rationale: "Font Awesome works well for the example toolbar, but making the reusable editor depend on it directly would force that bundle and visual vocabulary onto every consumer. A typed icon map lets examples and hosts choose their own icon library."
    applies_to:
      - "packages/react"
      - "packages/wysiwyg-lexical"
      - "examples/dev-harness"
  - id: LESSON-022
    date: 2026-05-14
    area: e2e
    lesson: "Renderer e2e fixtures need both successful and intentionally broken blocks."
    rationale: "A renderer page with only successful diagrams proves the happy path but can miss failure isolation regressions. Keeping an invalid Mermaid block in the harness lets Playwright assert that errors stay inline while neighboring blocks keep rendering."
    applies_to:
      - "examples/dev-harness"
      - "renderer route"
      - "future renderer failure tests"
  - id: LESSON-023
    date: 2026-05-14
    area: release-gates
    lesson: "Separate MVP smoke gates from production certification gates in release docs."
    rationale: "Phase 5 can be complete for review with committed unit, browser, responsive, accessibility, performance, and security smoke evidence, while still documenting deeper axe, screen-reader, trace-based performance, and host-specific security certification as post-MVP or production-release responsibilities."
    applies_to:
      - "docs/release-readiness.md"
      - "docs/test-matrix.md"
      - "future release criteria"
  - id: LESSON-024
    date: 2026-05-14
    area: wysiwyg
    lesson: "Document WYSIWYG table normalizations as tests, not just prose."
    rationale: "Markdown table alignment, short rows, and extra cells can normalize during visual editing. Encoding those expectations in the WYSIWYG round-trip tests prevents accidental source churn from becoming implicit or surprising."
    applies_to:
      - "packages/wysiwyg-lexical"
      - "table editing"
      - "accepted normalizations"
  - id: LESSON-025
    date: 2026-05-15
    area: properties
    lesson: "Structured properties editing should clearly declare its YAML preservation boundary."
    rationale: "Typed frontmatter editing is useful, but once users reorder/add/remove properties the UI must serialize a canonical simple YAML shape. Tests and docs should make it explicit when comments, nested values, or complex structures are outside the structured editor's preservation model."
    applies_to:
      - "packages/codemirror"
      - "hybrid properties panel"
      - "frontmatter UX"
  - id: LESSON-026
    date: 2026-05-15
    area: host-services
    lesson: "Host-service demos should prove the callback boundary with real editor insertion."
    rationale: "A host-service type alone does not prove integration. The page suggestion and image upload example now exercises `searchLinks` and `uploadAsset` through the public React component and verifies that returned Markdown reaches the editor and preview."
    applies_to:
      - "packages/react"
      - "examples/dev-harness"
      - "host integration recipes"
  - id: LESSON-027
    date: 2026-05-15
    area: properties
    lesson: "Property schemas should guide compact editing before they enforce content policy."
    rationale: "The first useful schema boundary is labels, types, icons, defaults, and order because those directly improve the editing surface. Validation, required fields, and complex YAML fallback need separate UX so the editor does not silently block or damage source."
    applies_to:
      - "packages/core"
      - "packages/codemirror"
      - "packages/react"
      - "hybrid properties panel"
  - id: LESSON-028
    date: 2026-05-15
    area: wysiwyg
    lesson: "Lexical state helpers must not be reused directly from DOM event handlers."
    rationale: "The code-language popover reused a selection helper from scroll and resize listeners, which called `$getSelection()` outside an editor read/update scope. DOM-triggered observers should re-enter `editor.getEditorState().read(...)` before touching Lexical state."
    applies_to:
      - "packages/wysiwyg-lexical"
      - "selection-aware popovers"
      - "future Lexical plugins"
