# Scenario -> automated-test traceability manifest.
#
# Maps every scenario in features/*.feature to the unit and Playwright tests that
# verify it. `status` is one of:
#   covered  - a test directly asserts the scenario's observable outcome
#   partial  - related coverage exists but a key assertion is missing
#   none     - no automated test asserts this behavior
#
# A CI gate reads this file: every scenario must resolve to status != none (or be
# explicitly tagged @manual), and every referenced test id must still exist.
#
# unit refs use package/test-file::describe; e2e refs use spec-file::test-title.

meta:
  generated: "2026-06-06"
  totals: { scenarios: 52, covered: 52, partial: 0, none: 0 }

